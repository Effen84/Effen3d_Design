<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brinquedos — Effen3D Design</title>
  <meta name="description" content="Peças de impressão 3D para gaming — acessórios, suportes, figurines e muito mais. Effen3D Design, Portugal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- LIGHTBOX SIMPLES -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">×</span>
    <img id="lightboxImg" src="" alt="">
  </div>

  <!-- MODAL DE PRODUTO -->
  <div id="productModal" class="product-modal">
    <div class="product-modal-inner">
      <div class="product-modal-header">
        <span class="product-modal-title" id="modalTitle"></span>
        <button class="product-modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="product-modal-gallery" id="modalGallery"></div>
      <div class="product-modal-footer">
        <p>Clica numa foto para ampliar</p>
        <a href="https://wa.me/351928372914?text=Ol%C3%A1!%20Tenho%20interesse%20neste%20produto%20da%20Effen3D%20Design." target="_blank" class="btn btn-red">Pedir orçamento</a>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header id="header">
    <a href="index.html" class="header-logo">
      <img src="images/effen3d_new.png" alt="Effen3D Design" class="logo-top">
    </a>
    <nav class="header-nav">
      <a href="index.html#portfolio">Portefólio</a>
      <a href="index.html#servicos">Serviços</a>
      <a href="index.html#contacto">Contacto</a>
      <button type="button" class="btn-quote" onclick="window.location='https://wa.me/351928372914'">Pedir orçamento</button>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- CONTEÚDO -->
  <section class="cat-page">
    <div class="section-inner">
      <p class="section-label"><a href="index.html#portfolio" style="color:var(--red);text-decoration:none;">← Portefólio</a></p>
      <h1 class="cat-page-title">🧸 Brinquedos</h1>
      <p class="cat-page-sub">Clica num produto para ver todas as fotos</p>

      <div class="products-grid" id="productsGrid">
        <!-- Os produtos são gerados pelo JavaScript abaixo -->
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <img src="images/effen3d_new.png" alt="Effen3D Design" class="footer-logo">
      <p class="footer-copy">© 2025 Effen3D Design · Portugal · Todos os direitos reservados</p>
      <div class="footer-links">
        <a href="https://instagram.com/effen3d_design" target="_blank" rel="noopener">Instagram</a>
        <a href="mailto:effen3d_design@outlook.com">Email</a>
        <a href="https://wa.me/351928372914" target="_blank" rel="noopener">WhatsApp</a>
      </div>
    </div>
  </footer>

  <script>
    // ═══════════════════════════════════════════════
    // PRODUTOS — edita aqui quando adicionares fotos
    // Cada produto tem: nome e array de imagens
    // ═══════════════════════════════════════════════
    const produtos = [
      // EXEMPLO — substitui pelas tuas fotos reais:
      // {
      //   nome: "Suporte de Comando",
      //   fotos: ["images/gaming/comando1.jpg", "images/gaming/comando2.jpg", "images/gaming/comando3.jpg"]
      // },
    ];
    // ═══════════════════════════════════════════════

    // Renderizar produtos
    const grid = document.getElementById('productsGrid');
    if (produtos.length === 0) {
      grid.innerHTML = '<p style="color:var(--muted);grid-column:1/-1;text-align:center;padding:60px 0;">Em breve novos produtos! 🚀</p>';
    } else {
      produtos.forEach((p, i) => {
        grid.innerHTML += `
          <div class="product-card" onclick="openModal(${i})">
            <div class="product-thumb">
              <img src="${p.fotos[0]}" alt="${p.nome}" loading="lazy">
              <div class="product-overlay"><span>Ver mais</span></div>
            </div>
            <div class="product-info">
              <p class="product-name">${p.nome}</p>
              <p class="product-count">${p.fotos.length} foto${p.fotos.length > 1 ? 's' : ''}</p>
            </div>
          </div>`;
      });
    }

    // Modal
    function openModal(i) {
      const p = produtos[i];
      document.getElementById('modalTitle').textContent = p.nome;
      document.getElementById('modalGallery').innerHTML = p.fotos.map(f =>
        `<img src="${f}" alt="${p.nome}" onclick="openLightbox(this)" loading="lazy">`
      ).join('');
      document.getElementById('productModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      document.getElementById('productModal').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.getElementById('productModal').addEventListener('click', e => {
      if (e.target === document.getElementById('productModal')) closeModal();
    });

    // Lightbox
    function openLightbox(img) {
      document.getElementById('lightboxImg').src = img.src;
      document.getElementById('lightbox').style.display = 'flex';
    }
    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeLightbox(); } });

    // Header scroll
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 60));

    // Hamburger
    document.getElementById('hamburger').addEventListener('click', () => {
      document.querySelector('.header-nav').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('active');
    });
  </script>
</body>
</html>
